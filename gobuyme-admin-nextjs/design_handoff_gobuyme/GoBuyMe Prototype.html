// ─── FOOD IMAGE ──────────────────────────────────────────────
function FoodImg({ label, h = 180, radius = 12, overlay = true }) {
  const src = PHOTOS[label] || PHOTOS.burger;
  return (
    <div style={{
      width:'100%', height:h, borderRadius:radius,
      position:'relative', overflow:'hidden',
      backgroundColor:'#1A1A1A',
    }}>
      <img src={src} alt={label} style={{
        width:'100%', height:'100%', objectFit:'cover', display:'block',
      }}/>
      {overlay && <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,transparent 40%,rgba(0,0,0,0.75) 100%)'}}/>}
    </div>
  );
}

  cart: (c='#fff',s=22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/><line x1="3" y1="6" x2="21" y2="6" stroke={c} strokeWidth="1.8"/><path d="M16 10a4 4 0 01-8 0" stroke={c} strokeWidth="1.8"/></svg>,

  map: (c='#fff',s=22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/><line x1="8" y1="2" x2="8" y2="18" stroke={c} strokeWidth="1.8"/><line x1="16" y1="6" x2="16" y2="22" stroke={c} strokeWidth="1.8"/></svg>,

// ─── BOTTOM NAV ──────────────────────────────────────────────
function BottomNav({ active, onNav }) {
  const tabs = [
    { id:'home', icon: Icon.home, label:'Home' },
    { id:'search', icon: Icon.search, label:'Search' },
    { id:'favorites', icon: Icon.heart, label:'Saved' },
    { id:'profile', icon: Icon.user, label:'Profile' },
  ];
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0, zIndex:50,
      background: T.surface,
      borderTop:`1px solid ${T.border}`,
      display:'flex', paddingBottom:28, paddingTop:12,
    }}>
      {tabs.map(t => {
        const isActive = active === t.id;
        return (
          <button key={t.id} onClick={() => onNav(t.id)} style={{
            flex:1, background:'none', border:'none', cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:4,
            padding:0,
          }}>
            {t.icon(isActive ? T.primary : T.textMuted, 22)}
            <span style={{
              fontSize:10, fontWeight:600, color: isActive ? T.primary : T.textMuted,
              fontFamily: T.font,
            }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─── SCREEN: SPLASH ──────────────────────────────────────────

  return (
    <div style={{
      height:'100%', background: T.bg,
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      gap:16, paddingTop:60,
    }}>
      <div style={{
        width:80, height:80, borderRadius:20,
        background:`linear-gradient(135deg, ${T.primary}, ${T.primaryDark})`,
        display:'flex', alignItems:'center', justifyContent:'center',
        boxShadow:`0 12px 40px ${T.primary}55`,
      }}>
        {Icon.bike('#fff', 40)}
      </div>
      <div style={{ textAlign:'center' }}>
        <div style={{ fontSize:34, fontWeight:800, color:T.text, letterSpacing:-1 }}>GoBuyMe</div>
        <div style={{ fontSize:14, color:T.textSec, marginTop:4, fontWeight:500 }}>Hungry? GoBuyMe. Anything.</div>
      </div>
      <div style={{
        marginTop:40, width:40, height:40,

// ─── SCREEN: ONBOARDING ──────────────────────────────────────
const slides = [
  {
    photo: 'https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=800&q=90',
    accent: '#FF521B',
    tag: '🍛 Food · Grocery · Pharmacy',
    headline: 'Jollof in\n25 minutes.',
    sub: 'Order from your favourite spots — food, groceries, pharmacy, and more.',
  },
  {
    photo: 'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=800&q=90',
    accent: '#1A9E5F',
    tag: '🏪 Vendors · Restaurants · Shops',
    headline: 'Sell to thousands.\nStress less.',
    sub: 'List your store, accept orders, and get paid daily. We handle delivery.',
  },
  {
    photo: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=90',
    accent: '#1A6EFF',
    tag: '🏍️ Riders · Flexible Hours',
    headline: 'Ride. Earn.\nRepeat.',
    sub: 'Flexible hours. Weekly cash-out. Top riders earn ₦150k+ per month.',
  },
];

function OnboardingScreen({ onDone }) {
  const [idx, setIdx] = useState(0);
  const [animating, setAnimating] = useState(false);
  const s = slides[idx];

  const next = () => {
    if (animating) return;
    if (idx < slides.length - 1) {
      setAnimating(true);
      setTimeout(() => { setIdx(i => i+1); setAnimating(false); }, 300);
    } else {
      onDone();
    }
  };

  return (
    <div style={{ height:'100%', position:'relative', overflow:'hidden', background:'#000' }}>
      {/* Full-bleed photo */}
      <img
        key={idx}
        src={s.photo}
        alt="slide"
        style={{
          position:'absolute', inset:0, width:'100%', height:'100%',
          objectFit:'cover', objectPosition:'center',
          opacity: animating ? 0 : 1,
          transition:'opacity 0.35s ease',
        }}
      />

      {/* Multi-layer dark gradient */}
      <div style={{
        position:'absolute', inset:0,
        background:'linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.05) 35%, rgba(0,0,0,0.1) 55%, rgba(0,0,0,0.92) 100%)',
      }}/>

      {/* Colour tint layer at bottom */}
      <div style={{
        position:'absolute', bottom:0, left:0, right:0, height:'55%',
        background:`linear-gradient(180deg, transparent, ${s.accent}18 60%, ${s.accent}28 100%)`,
        transition:'background 0.4s ease',
      }}/>

      {/* Skip button */}
      <button onClick={onDone} style={{
        position:'absolute', top:72, right:20, zIndex:10,
        background:'rgba(255,255,255,0.15)', backdropFilter:'blur(8px)',
        border:'1px solid rgba(255,255,255,0.2)', borderRadius:99,
        padding:'6px 16px', cursor:'pointer', fontFamily:T.font,
        fontSize:13, fontWeight:600, color:'rgba(255,255,255,0.9)',
      }}>Skip</button>

      {/* Slide counter top-left */}
      <div style={{
        position:'absolute', top:76, left:20, zIndex:10,
        display:'flex', alignItems:'center', gap:6,
      }}>
        <span style={{ fontSize:13, fontWeight:700, color:'rgba(255,255,255,0.5)', fontFamily:T.font }}>
          {idx+1}<span style={{ color:'rgba(255,255,255,0.25)' }}>/{slides.length}</span>
        </span>
      </div>

      {/* Bottom content */}
      <div style={{
        position:'absolute', bottom:0, left:0, right:0, zIndex:10,
        padding:'0 24px 40px',
      }}>
        {/* Tag pill */}
        <div style={{
          display:'inline-flex', alignItems:'center',
          background:'rgba(255,255,255,0.12)', backdropFilter:'blur(12px)',
          border:'1px solid rgba(255,255,255,0.18)',
          borderRadius:99, padding:'6px 14px', marginBottom:16,
        }}>
          <span style={{ fontSize:12, fontWeight:600, color:'rgba(255,255,255,0.9)', fontFamily:T.font }}>{s.tag}</span>
        </div>

        {/* Headline */}
        <div style={{
          fontSize:42, fontWeight:800, color:'#fff', lineHeight:1.1,
          letterSpacing:-1.5, whiteSpace:'pre-line', marginBottom:14,
          textShadow:'0 2px 20px rgba(0,0,0,0.5)',
        }}>{s.headline}</div>

        {/* Sub */}
        <div style={{
          fontSize:15, color:'rgba(255,255,255,0.75)', lineHeight:1.6,
          marginBottom:32, maxWidth:300,
          textShadow:'0 1px 8px rgba(0,0,0,0.5)',
        }}>{s.sub}</div>

        {/* Dots + CTA row */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', gap:7, alignItems:'center' }}>
            {slides.map((_,i) => (
              <div key={i} onClick={() => setIdx(i)} style={{
                height:5, borderRadius:3, transition:'all 0.3s',
                width: i===idx ? 32 : 5,
                background: i===idx ? '#fff' : 'rgba(255,255,255,0.3)',
                cursor:'pointer',
              }}/>
            ))}
          </div>

          <button onClick={next} style={{
            height:54, borderRadius:27,
            padding: idx === slides.length-1 ? '0 28px' : '0',
            width: idx === slides.length-1 ? 'auto' : 54,
            background: s.accent,
            border:'none', cursor:'pointer', display:'flex',
            alignItems:'center', justifyContent:'center', gap:8,
            boxShadow:`0 8px 28px ${s.accent}66`,
            transition:'all 0.3s ease', fontFamily:T.font,
          }}>
            {idx === slides.length-1
              ? <span style={{ fontSize:15, fontWeight:700, color:'#fff' }}>Get Started</span>
              : Icon.chevRight('#fff', 22)
            }
          </button>
        </div>
      </div>
    </div>
  );
}

        <div style={{ fontSize:30, fontWeight:800, color:T.text, letterSpacing:-0.5 }}>Welcome back 👋</div>

      <div style={{ padding:'0 20px', display:'flex', flexDirection:'column', gap:14 }}>
        <AppInput label="Email address" value={email} onChange={setEmail} placeholder="you@example.com" type="email"/>
        <AppInput label="Password" value={pass} onChange={setPass} placeholder="••••••••" type="password"/>
        <div style={{ textAlign:'right' }}>
          <span style={{ fontSize:13, color:T.primary, fontWeight:600 }}>Forgot password?</span>
        </div>
        <PrimaryBtn onPress={onLogin}>Sign In</PrimaryBtn>
        {/* Google */}
        <button style={{

function OrderTrackingScreen({ onBack, onDone }) {
  const statuses = ['confirmed','preparing','ready','picked_up','delivered'];
  const labels = ['Order Confirmed','Preparing Food','Ready for Pickup','Rider on the way','Delivered!'];
  const [step, setStep] = useState(0);
  const [eta, setEta] = useState(22);

  useEffect(() => {
    if (step < statuses.length - 1) {
      const t = setTimeout(() => { setStep(s => s+1); setEta(e => Math.max(0, e-5)); }, 3000);
      return () => clearTimeout(t);
    }
  }, [step]);

  const statusColors = ['#F5A623','#F5A623','#1A9E5F','#1A6EFF','#1A9E5F'];

      </div>
      <div style={{ display:'flex', alignItems:'center', gap:16, padding:'0 20px 24px', borderBottom:`1px solid ${T.border}` }}>
        <div style={{
          width:64, height:64, borderRadius:32, background:`linear-gradient(135deg, ${T.primary}, ${T.primaryDark})`,
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:28,
        }}>👤</div>
        <div>
          <div style={{ fontSize:18, fontWeight:800, color:T.text }}>Chioma Adaeze</div>
          <div style={{ fontSize:13, color:T.textSec }}>chioma@example.com · +234 812 345 6789</div>
        </div>
        <button style={{
          marginLeft:'auto', background:T.primaryTint, border:'none', borderRadius:8, cursor:'pointer',
          padding:'6px 12px', fontSize:12, fontWeight:700, color:T.primary, fontFamily:T.font,
        }}>Edit</button>
      </div>
      <div style={{ padding:'16px 20px', display:'flex', flexDirection:'column' }}>
        {items.map(([icon,label,sub],i) => (
          <div key={i} style={{
            display:'flex', alignItems:'center', gap:14, padding:'14px 0',
            borderBottom: i < items.length-1 ? `1px solid ${T.border}` : 'none',
            cursor:'pointer',
          }}>
            <span style={{ fontSize:20, width:24, textAlign:'center' }}>{icon}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14, fontWeight:600, color: label==='Sign Out' ? '#E23B3B' : T.text }}>{label}</div>
              {sub && <div style={{ fontSize:11, color:T.textSec, marginTop:1 }}>{sub}</div>}
            </div>
            {label !== 'Sign Out' && Icon.chevRight(T.textMuted, 14)}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────
function App() {
  const tweaks = { ...TWEAK_DEFAULTS };
  const [screen, setScreen] = useState(tweaks.startScreen || 'splash');
  const [nav, setNav] = useState('home');
  const [selectedVendor, setSelectedVendor] = useState(null);
  const [cartItems, setCartItems] = useState([]);
  const [cartVendor, setCartVendor] = useState(null);
  const [tweakOpen, setTweakOpen] = useState(false);
  const [isDark, setIsDark] = useState(() => {
    try { const v = localStorage.getItem('gbm_dark'); return v === null ? true : v === 'true'; } catch { return true; }
  });

  // Apply theme globally before any render
  T = isDark ? DARK_T : LIGHT_T;

  // Persist nav position
  useEffect(() => {
    try { const s = localStorage.getItem('gbm_screen'); if(s) setScreen(s); } catch(e) {}
  }, []);
  useEffect(() => {
    try { localStorage.setItem('gbm_screen', screen); } catch(e) {}
  }, [screen]);

  const cartCount = cartItems.reduce((s,i) => s+i.qty, 0);
  const cartTotal = cartItems.reduce((s,i) => s+i.price*i.qty, 0) + 800;

  const addToCart = (item, delta) => {
    setCartItems(prev => {
      const existing = prev.find(i => i.id===item.id);
      if (!existing) return delta > 0 ? [...prev, {...item, qty:1}] : prev;
      const newQty = existing.qty + delta;
      if (newQty <= 0) return prev.filter(i => i.id!==item.id);
      return prev.map(i => i.id===item.id ? {...i, qty:newQty} : i);
    });
    if (selectedVendor) setCartVendor(selectedVendor);
  };

  const handleNav = id => {
    setNav(id);
    setScreen('main');
  };

  const renderContent = () => {
    if (screen === 'splash') return <SplashScreen onDone={() => setScreen('onboarding')}/>;
    if (screen === 'onboarding') return <OnboardingScreen onDone={() => setScreen('role')}/>;
    if (screen === 'role') return <RoleSelectScreen onSelect={() => setScreen('login')}/>;
    if (screen === 'login') return <LoginScreen onLogin={() => setScreen('main')} onRegister={() => setScreen('main')}/>;
    if (screen === 'vendor') return (
      <VendorDetailScreen
        vendor={selectedVendor}
        onBack={() => setScreen('main')}
        onAddToCart={addToCart}
        cartItems={cartItems}
      />
    );
    if (screen === 'cart') return (
      <CartScreen
        cartItems={cartItems}
        onUpdateCart={addToCart}
        onBack={() => setScreen(selectedVendor ? 'vendor' : 'main')}
        onCheckout={() => setScreen('checkout')}
        vendor={cartVendor}
      />
    );
    if (screen === 'checkout') return (
      <CheckoutScreen
        onBack={() => setScreen('cart')}
        onPay={() => setScreen('tracking')}
        total={cartTotal}
      />
    );
    if (screen === 'tracking') return (
      <OrderTrackingScreen
        onBack={() => { setScreen('main'); setCartItems([]); }}
        onDone={() => { setScreen('main'); setCartItems([]); }}
      />
    );
    if (screen === 'vendor_dashboard') return (
      <VendorDashboardScreen onBack={() => setScreen('main')}/>
    );
    if (screen === 'rider_dashboard') return (
      <RiderDashboardScreen
        onAvailableOrders={() => setScreen('rider_jobs')}
        onActiveDelivery={() => setScreen('rider_active')}
      />
    );
    if (screen === 'rider_jobs') return (
      <AvailableOrdersScreen
        onBack={() => setScreen('rider_dashboard')}
        onAccept={job => { setSelectedVendor(job); setScreen('rider_active'); }}
      />
    );
    if (screen === 'rider_active') return (
      <ActiveDeliveryScreen
        job={selectedVendor}
        onBack={() => setScreen('rider_jobs')}
        onComplete={() => setScreen('rider_dashboard')}
      />
    );
    if (screen === 'search') return (
      <SearchScreen
        onBack={() => setScreen('main')}
        onVendor={v => { setSelectedVendor(v); setScreen('vendor'); }}
      />
    );
    // main
    if (nav === 'profile') return <ProfileScreen/>;
    if (nav === 'search') return (
      <SearchScreen
        onBack={() => setNav('home')}
        onVendor={v => { setSelectedVendor(v); setScreen('vendor'); }}
      />
    );
    // home (default)
    return (
      <HomeScreen
        onVendor={v => { setSelectedVendor(v); setScreen('vendor'); }}
        onCart={() => setScreen('cart')}
        cartCount={cartCount}
        onSearch={() => setScreen('search')}
      />
    );
  };

  const showBottomNav = screen === 'main';

  // Tweaks
  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    });
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
  }, []);

  const outerBg = isDark
    ? 'radial-gradient(ellipse at center, #2A1A0E 0%, #111 60%, #0A0A0A 100%)'
    : 'radial-gradient(ellipse at center, #F0EBE3 0%, #E8E0D8 60%, #DDD5CC 100%)';

  return (
    <div style={{
      width:'100vw', height:'100vh',
      display:'flex', alignItems:'center', justifyContent:'center',
      background: outerBg,
      fontFamily:T.font,
    }}>
      <IOSDevice width={390} height={844} dark={isDark}>
        {/* status bar spacer */}
        <div style={{ position:'absolute', top:0, left:0, right:0, zIndex:100, pointerEvents:'none' }}>
          <IOSStatusBar dark={isDark} time="9:41"/>
        </div>
        <div style={{
          position:'absolute', inset:0,
          background:T.bg,
          display:'flex', flexDirection:'column',
          overflow:'hidden',
        }}>
          <div style={{ flex:1, position:'relative', overflow:'hidden' }}>
            {renderContent()}
            {showBottomNav && (
              <BottomNav active={nav} onNav={handleNav}/>
            )}
          </div>
        </div>
      </IOSDevice>

      {/* Tweaks panel */}
      {tweakOpen && (
        <div style={{
          position:'fixed', bottom:20, right:20, zIndex:9999,
          background:'#1E1E1E', borderRadius:16, padding:20, width:260,
          border:'1px solid #333', boxShadow:'0 16px 48px rgba(0,0,0,0.6)',
          fontFamily:T.font,
        }}>
          <div style={{ fontSize:14, fontWeight:700, color:'#fff', marginBottom:16 }}>Tweaks</div>
          <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
            <div>
              <div style={{ fontSize:11, fontWeight:600, color:'#888', marginBottom:8, textTransform:'uppercase', letterSpacing:0.5 }}>Theme</div>
              <div style={{ display:'flex', gap:8 }}>
                {[['🌑 Dark', true], ['☀️ Light', false]].map(([label, val]) => (
                  <button key={label} onClick={() => {
                    setIsDark(val);
                    try { localStorage.setItem('gbm_dark', val); } catch {}
                    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ darkMode: val }}, '*');
                  }} style={{
                    flex:1, padding:'7px', borderRadius:8, cursor:'pointer',
                    background: isDark===val ? T.primary : '#2E2E2E',
                    border:'none', fontFamily:T.font,
                    fontSize:12, fontWeight:700, color:'#fff',
                  }}>{label}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize:11, fontWeight:600, color:'#888', marginBottom:8, textTransform:'uppercase', letterSpacing:0.5 }}>Start Screen</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                {['splash','onboarding','role','login','main'].map(s => (
                  <button key={s} onClick={() => setScreen(s)} style={{
                    padding:'5px 10px', borderRadius:6, cursor:'pointer',
                    background: screen===s ? T.primary : '#2E2E2E',
                    border:'none', fontFamily:T.font,
                    fontSize:11, fontWeight:600, color:'#fff', textTransform:'capitalize',
                  }}>{s}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize:11, fontWeight:600, color:'#888', marginBottom:8, textTransform:'uppercase', letterSpacing:0.5 }}>Quick Navigate</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                {[['cart','Cart'],['checkout','Checkout'],['tracking','Live Tracking'],['search','Search'],['vendor_dashboard','Vendor Dash'],['rider_dashboard','Rider Dash'],['rider_jobs','Rider Jobs'],['rider_active','Active Delivery']].map(([s,l]) => (
                  <button key={s} onClick={() => setScreen(s)} style={{
                    padding:'5px 10px', borderRadius:6, cursor:'pointer',
                    background: screen===s ? T.primary : '#2E2E2E',
                    border:'none', fontFamily:T.font,
                    fontSize:11, fontWeight:600, color:'#fff',
                  }}>{l}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize:11, fontWeight:600, color:'#888', marginBottom:6, textTransform:'uppercase', letterSpacing:0.5 }}>Fill Demo Cart</div>
              <button onClick={() => {
                setCartItems([
                  {...MENU_ITEMS[0], qty:1},
                  {...MENU_ITEMS[1], qty:2},
                ]);
                setCartVendor(VENDORS[0]);
              }} style={{
                padding:'8px 14px', borderRadius:8, cursor:'pointer',
                background:'#2E2E2E', border:'none', fontFamily:T.font,
                fontSize:12, fontWeight:600, color:'#fff', width:'100%',
              }}>Add 2 items to cart</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
