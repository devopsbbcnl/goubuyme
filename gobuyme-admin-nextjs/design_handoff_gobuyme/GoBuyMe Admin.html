// ── Mini sparkline ──────────────────────────────────────────
function Sparkline({ data, color, h=36, w=80 }) {
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v,i) => {
    const x = (i / (data.length-1)) * w;
    const y = h - ((v-min)/range)*(h-4) - 2;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <polyline points={`0,${h} ${pts} ${w},${h}`} fill={`${color}18`} stroke="none"/>
    </svg>
  );
}

// ── Bar chart ───────────────────────────────────────────────
function BarChart({ data, labels, color, h=120 }) {
  const max = Math.max(...data);
  return (
    <div style={{ display:'flex', alignItems:'flex-end', gap:6, height:h+20 }}>
      {data.map((v,i) => (
        <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:5 }}>
          <div style={{
            width:'100%', borderRadius:'4px 4px 0 0',
            height:`${(v/max)*h}px`,
            background: i===data.length-1 ? color : `${color}50`,
            transition:'height 0.6s ease',
            minHeight:4,
          }}/>
          <span style={{ fontSize:10, color:T.textMuted, fontWeight:600 }}>{labels[i]}</span>
        </div>
      ))}
    </div>
  );
}

// ── Donut chart ──────────────────────────────────────────────
function DonutChart({ segments, size=100 }) {
  const r = 36, cx = 50, cy = 50, total = segments.reduce((s,x)=>s+x.value,0);
  let angle = -Math.PI/2;
  const paths = segments.map(seg => {
    const sweep = (seg.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    return { d:`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`, color:seg.color, label:seg.label, value:seg.value };
  });
  return (
    <svg width={size} height={size} viewBox="0 0 100 100">
      {paths.map((p,i) => <path key={i} d={p.d} fill={p.color} opacity="0.9"/>)}
      <circle cx={50} cy={50} r={24} fill={T.surface}/>
    </svg>
  );
}

// ── Status badge ────────────────────────────────────────────
function Badge({ status }) {
  const map = {
    APPROVED:   { color:T.success, bg:T.successBg, label:'Approved' },
    PENDING:    { color:T.warning, bg:T.warningBg, label:'Pending' },
    REJECTED:   { color:T.error,   bg:T.errorBg,   label:'Rejected' },
    SUSPENDED:  { color:T.error,   bg:T.errorBg,   label:'Suspended' },
    DELIVERED:  { color:T.success, bg:T.successBg, label:'Delivered' },
    IN_TRANSIT: { color:T.info,    bg:T.infoBg,    label:'In Transit' },
    PREPARING:  { color:T.warning, bg:T.warningBg, label:'Preparing' },
    CANCELLED:  { color:T.error,   bg:T.errorBg,   label:'Cancelled' },
    CONFIRMED:  { color:T.info,    bg:T.infoBg,    label:'Confirmed' },
    ONLINE:     { color:T.success, bg:T.successBg, label:'Online' },
    OFFLINE:    { color:T.textSec, bg:T.surface3,  label:'Offline' },
  };
  const m = map[status] || map.PENDING;
  return (
    <span style={{
      fontSize:11, fontWeight:700, color:m.color, background:m.bg,
      borderRadius:6, padding:'3px 9px', whiteSpace:'nowrap',
    }}>{m.label}</span>
  );
}

        </div>
        <div style={{ fontSize:24, opacity:0.7 }}>{icon}</div>

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end' }}>
        <div style={{ display:'flex', alignItems:'center', gap:5 }}>

          </span>
          <span style={{ fontSize:11, color:T.textMuted }}>vs last week</span>
        </div>
        <Sparkline data={sparkData} color={color}/>
      </div>
    </div>
  );
}

            display:'flex', alignItems:'center', justifyContent:'center', fontSize:12,
          }}>👤</div>
          <span style={{ fontSize:13, fontWeight:600, color:T.text }}>Super Admin</span>
          {Ic.chevR}
        </div>
      </div>
    </div>
  );
}

// ── Root App ─────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState(() => {
    try { return localStorage.getItem('gbm_admin_page') || 'overview'; } catch { return 'overview'; }
  });
  const [tweakOpen, setTweakOpen] = useState(false);
  const [isDark, setIsDark] = useState(() => {
    try { const v = localStorage.getItem('gbm_admin_dark'); return v === null ? true : v === 'true'; } catch { return true; }
  });

  T = isDark ? ADMIN_DARK : ADMIN_LIGHT;

  const navigate = p => {
    setPage(p);
    try { localStorage.setItem('gbm_admin_page', p); } catch {}
  };

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakOpen(false);
    });
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
  }, []);

  const renderPage = () => {
    switch(page) {
      case 'vendors': return <VendorsPage/>;
      case 'orders':  return <OrdersPage/>;
      case 'riders':  return <RidersPage/>;
      case 'audit':   return <AuditPage/>;
      default:        return <OverviewPage/>;
    }
  };

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden', fontFamily:T.font, background:T.bg }}>
      <Sidebar active={page} onNav={navigate} isDark={isDark} onToggleTheme={() => {
        const next = !isDark;
        setIsDark(next);
        try { localStorage.setItem('gbm_admin_dark', next); } catch {}
      }}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <TopBar page={page}/>
        <div style={{ flex:1, overflowY:'auto', padding:'24px 28px', background:T.bg }}>
          {renderPage()}
        </div>
      </div>

      {/* Tweaks */}
      {tweakOpen && (
        <div style={{
          position:'fixed', bottom:20, right:20, zIndex:9999,
          background:'#1E1E1E', borderRadius:14, padding:18, width:220,
          border:'1px solid #333', boxShadow:'0 16px 48px rgba(0,0,0,0.6)',
          fontFamily:T.font,
        }}>
          <div style={{ fontSize:13, fontWeight:700, color:'#fff', marginBottom:14 }}>Tweaks</div>
          <div style={{ fontSize:11, fontWeight:600, color:'#888', marginBottom:8, textTransform:'uppercase', letterSpacing:0.5 }}>Theme</div>
          <div style={{ display:'flex', gap:8, marginBottom:14 }}>
            {[['🌑 Dark', true],['☀️ Light', false]].map(([lbl, val]) => (
              <button key={lbl} onClick={() => { setIsDark(val); try { localStorage.setItem('gbm_admin_dark', val); } catch {} }} style={{
                flex:1, padding:'7px', borderRadius:7, cursor:'pointer',
                background: isDark===val ? T.primary : '#2E2E2E',
                border:'none', fontFamily:T.font, fontSize:11, fontWeight:700, color:'#fff',
              }}>{lbl}</button>
            ))}
          </div>
          <div style={{ fontSize:11, fontWeight:600, color:'#888', marginBottom:8, textTransform:'uppercase', letterSpacing:0.5 }}>Jump to Page</div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
            {['overview','vendors','riders','orders','audit'].map(p => (
              <button key={p} onClick={()=>navigate(p)} style={{
                padding:'5px 10px', borderRadius:6, cursor:'pointer',
                background: page===p ? T.primary : '#2E2E2E',
                border:'none', fontFamily:T.font,
                fontSize:11, fontWeight:600, color:'#fff', textTransform:'capitalize',
              }}>{p}</button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
